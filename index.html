<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Replay</title>

<script src="https://cdn.jsdelivr.net/npm/chess.js"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#board{
width:420px;
margin:auto;
margin-top:30px;
}

.square{
width:52px;
height:52px;
float:left;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
}

.white{background:#f0d9b5}
.black{background:#b58863}

.clock{
font-size:30px;
margin:10px;
}

</style>
</head>

<body>

<h2>Chess Replay</h2>

<input type="file" id="pgnFile">

<div>
White: <span id="whiteClock" class="clock">--:--</span>
Black: <span id="blackClock" class="clock">--:--</span>
</div>

<div id="board"></div>

<br>

<button onclick="startReplay()">Start Replay</button>

<script src="replay.js"></script>

</body>
</html>

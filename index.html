<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Chess Replay</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chess.js@1.0.0-beta.6"></script>
<script src="https://cdn.jsdelivr.net/npm/cm-chessboard@8/dist/cm-chessboard.min.js"></script>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/cm-chessboard@8/dist/cm-chessboard.css"/>

</head>

<body>

<h1>Realtime Chess Replay</h1>

<input type="file" id="pgnUpload" accept=".pgn">

<div class="clock-container">
<div>
<h3>White</h3>
<div id="whiteClock" class="clock">--:--</div>
</div>

<div>
<h3>Black</h3>
<div id="blackClock" class="clock">--:--</div>
</div>
</div>

<div id="board"></div>

<button id="startReplay">Start Replay</button>

<script src="replay.js"></script>

</body>
</html>

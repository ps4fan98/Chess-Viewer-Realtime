<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<title>Chess Realtime Replay</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#board{
width:420px;
margin:30px auto;
}

.clock{
font-size:30px;
margin:10px;
}

</style>

</head>

<body>

<h2>Chess Realtime Replay</h2>

<input type="file" id="pgnFile">

<div>
White: <span id="whiteClock" class="clock">--:--</span>
Black: <span id="blackClock" class="clock">--:--</span>
</div>

<div id="board"></div>

<button id="startBtn">Start Replay</button>

<script src="replay.js"></script>

</body>
</html>
